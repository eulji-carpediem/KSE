<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            background-color: #FFB9B9;
            width: 120px;
            height: 170px;
            border-radius: 8px;
            position: relative;
        }

        .main>div {
            background-color: #D9D9D9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }

        .main+div {
            width: 120px;
            font-weight: 400;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="main">
        <div></div>
    </div>
    <div>나른한 점심시간, 밖에서 밥먹기</div>
</body>

</html>
