<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            background-color: #FFB9B9;
            width: 250px;
            height: 150px;
            border-radius: 8px 8px 0 0;
        }

        .main+div {
            width: 250px;
            height: 75px;
            border: 1px solid #FFB9B9;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 30px 1fr;
            padding: 5px;
            font-size: 12px;

        }

        .circle {
            background-color: rgb(214, 214, 214);
            width: 24px;
            height: 24px;
            border-radius: 50%;

        }

        p {
            margin: 0;
        }

        div>p:nth-of-type(1) {
            grid-column: 1 /span 2;
        }
    </style>
</head>

<body>
    <div class="main">

    </div>
    <div>
        <p>안녕하세요. 텍스트입니다.</p>
        <div class="circle"></div>
        <p>휴양죠</p>
    </div>
</body>

</html>
