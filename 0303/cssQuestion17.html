<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main {
            width: 300px;
            height: 250px;
            border-radius: 8px;
            background-size: 300px;
            background-image: url('./img/background4.png');
            position: relative;
        }

        div {
            position: absolute;
            bottom: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.60);
            width: 300px;
            height: 56px;
            border-radius: 0 0 8px 8px;
            box-sizing: border-box;
            padding: 5px 10px;
        }

        p {
            margin: 0;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        p:nth-of-type(1) {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <main>
        <div>
            <p>새로운 시작!</p>
            <p style="color: #D1D1D1;">김작가</p>
        </div>
    </main>
</body>

</html>
