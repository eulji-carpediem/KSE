<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .imgSection {
            width: 278px;
            height: 160px;
            background-image: url("./img/background1.png");
            background-size: 278px;
            position: relative;
            background-repeat: no-repeat;
            border-radius: 8px;
        }

        .imgSection>div {
            bottom: 0px;
            left: 0px;
            background-color: #CA785C;
            height: 40px;
            width: 278px;
            position: absolute;
            border-radius: 0 0 8px 8px;
            font-weight: 700;
            font-size: 16px;
            line-height: 40px;
            color: #FFFFFF;
            padding-left: 10px;
            box-sizing: border-box;

        }
    </style>
</head>

<body>
    <div class="imgSection">
        <div>
            안녕하세요!
        </div>
</body>

</html>
