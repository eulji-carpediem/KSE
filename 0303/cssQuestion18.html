<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main {
            width: 332px;
            height: 100px;
            background-color: #FFE4E4;
            border-radius: 8px;
            display: flex;
        }

        main>div {
            height: 100px;
            width: 160px;
            border-radius: 8px;
            background-color: #FFB9B9;
        }

        section {
            box-sizing: border-box;
            padding: 10px;
        }

        section>div {
            width: 96px;
            height: 19px;
            font-size: 12px;
            font-weight: 400;
            background-color: #FFB9B9;
            color: #fff;
            text-align: center;
        }

        section>p {
            width: 123px;
            font-size: 16px;
            font-weight: 400;
            margin: 5px 0;
        }

        section>p:nth-of-type(2) {
            font-size: 14px;
            color: #8B8B8B;
        }
    </style>
</head>

<body>
    <main>
        <div></div>
        <section>
            <div>반가워요!</div>
            <p>좋은하루보내세요!</p>
            <p>날씨가 좋네요!</p>
        </section>
    </main>
</body>

</html>
