<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main {
            background-image: url("./img/background3.png");
            width: 320px;
            height: 320px;
            background-size: 320px;
            background-repeat: no-repeat;
            padding: 16px;
            display: grid;
            grid-template-columns: 80% 20%;
            grid-template-rows: 80% 20%;

        }

        .div1 {
            color: white;
            font-weight: 700;
            font-size: 24px;
        }

        .div2,
        .div3,
        .div4 {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .div2 {
            background-color: #E3FF92;
        }

        .div3 {
            background-color: #92F8FF;
        }

        .div4 {
            background-color: #FF9292;
        }
    </style>
</head>

<body>
    <main>
        <div class="div1">인테리어 디자인</div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
    </main>
</body>

</html>
