<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .imgSection {
            width: 160px;
            height: 240px;
            background-image: url("./img/background2.png");
            background-size: 160px;
            position: relative;
            background-repeat: no-repeat;
            border-radius: 4px;
        }

        .imgSection>div {
            bottom: 0px;
            left: 0px;
            background-color: #CA785C;
            height: 70px;
            width: 160px;
            position: absolute;
            border-radius: 0 0 4px 4px;
            color: #FFFFFF;
            padding: 5px;
            box-sizing: border-box;

        }

        .imgSection>div>p {
            font-weight: 700;
            margin-bottom: 10px;

        }

        .imgInfo {
            display: flex;
            justify-content: space-between;
        }

        p {
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="imgSection">
        <div>
            <p>인테리어란?</p>
            <div class="imgInfo">
                <p>김작가</p>
                <p>2024.01.01</p>
            </div>
        </div>
</body>

</html>
