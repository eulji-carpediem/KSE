<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;

        }

        nav,
        main,
        aside {
            border: 1px solid #a8dadc;
            padding: 0 10px;
            background-color: ffffff;

        }


        main>p,
        main>pre {
            display: inline;
        }


        .div1 {
            background-color: #a8dadc;
            border: 1px dashed #457b9d;
            padding: 10px;
        }

        ul {
            padding-left: 20px;
        }

        .grid {
            display: grid;
            grid-template-rows: 40px 1fr 40px;
            gap: 10px;
            height: 100vh;
            margin: 0;
            padding: 0;

        }

        header {
            background-color: #1d3557;
            color: #fefffd;
            height: 40px;
            padding: 10px;
        }

        .grid>section {
            background-color: #ffffff;
            color: #1d3557;
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            padding: 0 10px;
            gap: 10px;

        }

        footer {
            background-color: #1d3557;
            color: #fefffd;
            height: 40px;
            padding: 10px;

        }

        @media(max-width: 768px) {

            /* .grid>section {
                background-color: #ffffff;
                color: #1d3557;
                display: grid;
                grid-template-rows: 1fr 200px;
                grid-template-columns: 150px 1fr;
                padding: 0 10px;
                gap: 10px;
                grid-template-columns: 1fr;

            }

            nav {
                grid-row: 1/span 2;
            } */
            .grid>section {
                background-color: #ffffff;
                color: #1d3557;
                display: grid;
                grid-template-rows: 200px 1fr 200px;
                padding: 0 10px;
                gap: 10px;
                grid-template-columns: 1fr;

            }

            nav {
                grid-row: 1/span 1;
            }
        }

        @media(max-width: 480px) {
            .grid>section {
                background-color: #ffffff;
                color: #1d3557;
                display: grid;
                grid-template-rows: 200px 1fr 200px;
                padding: 0 10px;
                gap: 10px;
                grid-template-columns: 1fr;

            }

            nav {
                grid-row: 1/span 1;
            }

        }
    </style>
</head>

<body>
    <section class="grid">
        <header>
            머리부(Header)
        </header>
        <section>
            <nav>
                <h4>네비게이션(Nav)</h4>
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </nav>
            <main>
                <h1>메인 콘텐츠(Main)</h1>
                <div class="div1">양 옆은 고정폭, 가운데는 가변폭!</div>
                <p>Hint. 가운데 영역은</p>
                <pre>flex: 1</pre>
                <p>로 남는 공간을 차지합니다.</p>
            </main>
            <aside>
                <h4>사이드바(Aside)</h4>
                <p>공지/광고/프로필 등</p>
            </aside>
        </section>
        <footer>
            바닥부(Footer)
        </footer>
    </section>
</body>

</html>
